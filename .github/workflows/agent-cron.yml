# Free external cron — triggers NXT LINK agent pipeline
# GitHub Actions is free for public repos (2000 min/month for private)
# This replaces the Vercel Hobby cron limitation (1 daily max)

name: Agent Pipeline Cron

on:
  schedule:
    # Run every 6 hours (4 times/day) — free tier friendly
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger agent cron
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/agents/cron" \
            -H "User-Agent: NXTLink-GitHubActions/1.0"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Trigger insight generation
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/insights" \
            -H "User-Agent: NXTLink-GitHubActions/1.0"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
